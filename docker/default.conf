server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Deny access to sensitive directories/files
    location ~ ^/(pp-content|pp-config\.php|pp-temp-config\.php|docker|\.git|\.env) {
        deny all;
        return 404;
    }

    # Block direct access to any PHP file except index.php
    location ~ \.php$ {
        return 403;
    }

    # Handle index.php via PHP-FPM (exact match takes priority)
    location = /index.php {
        fastcgi_pass unix:/var/run/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # URL rewriting - route everything through index.php
    location / {
        try_files $uri $uri/ /index.php?page=$uri&$args;
    }
}
