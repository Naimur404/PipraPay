server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;

    # Deny access to sensitive paths
    location ~ ^/(pp-content|pp-config\.php|pp-temp-config\.php|docker|\.git|\.env) {
        return 404;
    }

    # Route everything through index.php
    location / {
        try_files $uri $uri/ /index.php?page=$uri&$args;
    }

    # Only process index.php through PHP-FPM
    location = /index.php {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Block all other PHP files
    location ~ \.php$ {
        return 403;
    }
}
