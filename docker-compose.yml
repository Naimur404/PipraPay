services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-piprapay}
      - DB_USER=${DB_USER:-piprapay}
      - DB_PASS=${DB_PASS:-secret}
    volumes:
      - app_media:/var/www/html/pp-media
      - app_config:/var/www/html/pp-config
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootsecret}
      MYSQL_DATABASE: ${DB_NAME:-piprapay}
      MYSQL_USER: ${DB_USER:-piprapay}
      MYSQL_PASSWORD: ${DB_PASS:-secret}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
  app_media:
  app_config:
